<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>FIA FOX — Dokument viewer </title>
<style>
  :root{--navy:#1F3864;--gold:#FFC000;--red:#C00000;--lightblue:#D6E6F2;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Calibri,Segoe UI,Arial,sans-serif;background:#4a5568;min-height:100vh;}
  header{position:sticky;top:0;z-index:10;background:var(--navy);color:#fff;padding:6px 10px;}
  .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .brand{font-weight:bold;font-size:14px;white-space:nowrap;}
  .pageinfo{font-size:13px;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:6px;white-space:nowrap;}
  .row1 button,.row1 a.btn{border:0;border-radius:6px;padding:5px 9px;font-size:13px;cursor:pointer;
    background:var(--lightblue);color:var(--navy);font-weight:bold;text-decoration:none;display:inline-block;}
  .row1 a.btn.dl{background:var(--gold);color:#000;}
  .spacer{flex:1;}
  .row1 a.btn.rel{background:var(--red);color:#fff;}
  #relbar{display:inline-flex;align-items:center;gap:4px;flex-wrap:wrap;margin-right:2px;}
  #relbar .rlab{font-size:11px;color:#cfe0f5;white-space:nowrap;margin-right:2px;}
  #relbar a.relflag{width:30px;padding:3px 0;text-align:center;border-radius:5px;color:#fff;
    font-weight:bold;font-size:12px;text-decoration:none;border:2px solid transparent;}
  #relbar a.relflag.f-DE,#langbar a.f-DE{background:#345086;}
  /* jazyková lišta — FOX0: každý jazyk svoja farba, aktívny zlatý rámček */
  #langbar{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
  #langbar a{padding:4px 0;width:44px;text-align:center;border-radius:5px;color:#fff;
    font-weight:bold;font-size:13px;text-decoration:none;border:2px solid transparent;}
  #langbar a.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);cursor:default;}
  #langbar a.qesjump{width:auto;padding:4px 11px;background:var(--gold);color:#000;font-weight:700;border-color:#8a6d00;}
  #langbar a.sumref{width:auto;padding:4px 11px;background:#0f6b57;color:#eafff8;font-weight:700;border-color:#17a184;}
  #sumbox{position:fixed;inset:0;background:rgba(12,22,38,.72);display:none;z-index:9999;
    align-items:flex-start;justify-content:center;padding:70px 16px 24px;overflow:auto;}
  #sumbox.on{display:flex;}
  #sumbox .sb{background:#fff;color:#16233a;max-width:760px;width:100%;border-radius:14px;
    box-shadow:0 18px 60px rgba(0,0,0,.45);padding:26px 30px 30px;position:relative;}
  #sumbox h3{margin:0 0 14px;font-size:19px;color:#1F3864;padding-right:34px;}
  #sumbox p{margin:0 0 12px;line-height:1.62;font-size:15.5px;}
  #sumbox a{color:#0b5ed7;}
  #sumbox .sbx{position:absolute;top:10px;right:14px;font-size:26px;line-height:1;
    text-decoration:none;color:#7b8798;cursor:pointer;}
  #sumbox .sbx:hover{color:#16233a;}
  #langbar a.lawref{width:auto;padding:4px 11px;background:#123a6b;color:#dbe7f7;font-weight:600;border-color:#3d6ea8;}
  .f-DE{background:#1F3864}.f-HR{background:#C00000}.f-EN{background:#2E75B6}.f-FR{background:#7030A0}
  .f-PL{background:#C55A11}.f-IT{background:#00B050}.f-SK{background:#1F7A7A}.f-ES{background:#A0326E}.f-SV{background:#806000}.f-GA{background:#169B62}
  #status{color:#fff;font-size:13px;padding:6px 12px;}
  #pages{max-width:900px;margin:10px auto;padding:0 6px;}
  .pagewrap{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4);margin:0 auto 12px;position:relative;}
  .pagewrap .pnum{position:absolute;top:4px;right:8px;font-size:11px;color:#999;}
  canvas{display:block;width:100%;height:auto;}
  .linklayer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;}
  .linklayer a{position:absolute;display:block;pointer-events:auto;}
  .linklayer a:hover{background:rgba(255,192,0,.18);outline:1px solid rgba(255,192,0,.6);border-radius:2px;}
  #err{max-width:900px;margin:20px auto;background:#FDE8E8;border:1px solid var(--red);padding:12px;border-radius:8px;display:none;font-size:14px;}
</style>
<!-- build:links-layer -->
</head>
<body>
<header>
  <div class="row1">
    <span class="brand">FIA FOX — Dokument</span>
    <span class="pageinfo">str. <span id="cur">–</span> / <span id="total">–</span></span>
    <button id="zoomOut" title="Zmenšiť">−</button>
    <button id="zoomIn" title="Zväčšiť">+</button>
    <span class="spacer"></span>
    <span id="relbar" style="display:none"></span>
    <a id="dl" class="btn dl" href="#" download>⬇ Podpísaný originál (QES)</a>
  </div>
  <nav id="langbar" aria-label="Jazyky dokumentu"></nav>
</header>
<div id="status">Načítavam dokument…</div>
<div id="err"></div>
<div id="pages"></div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
(function(){
  "use strict";
  if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  /* ============================================================
     PARAMETRE (produkčné rozhranie):
       doc   = URL primárneho PDF  (alebo skratka)
       doc2  = URL sekundárneho PDF (voliteľné — jazyky mimo primárneho)
       page  = úvodná strana v primárnom PDF
       langs = CODE:PAGE[:2|:o],...   tretí token "2" = jazyk žije v doc2;
               "o" = vlajka je externý odkaz na orig= (reálne odoslaný podpísaný originál, nový tab)
       qes   = PAGE[:DOC[:ALIGN]]  strana s vizuálnym QES podpisom -> tlačidlo "✍ QES"
               za poslednou vlajkou. ZADÁVA SA VŽDY RUČNE (poloha podpisu aj podpisový
               jazyk sa menia dokument od dokumentu). DOC default 2, ak je doc2.
               ALIGN: b = spodok strany (default), t = vrch, 0..1 = pomer výšky strany
       sum   = ID súhrnného modálu na karte registra, napr. summod-zaloba-03.
               Tlačidlo "Súhrn" načíta text PRIAMO Z KARTY #303 (jediný zdroj)
               a zobrazí ho v okne vo vieweri. Text sa mení s vlajkou.
               Ak je zadaná plná URL (http…), otvorí sa ako odkaz v novom okne.
               -> tlačidlo "Súhrn" za poslednou vlajkou, text sa mení s vlajkou
       law   = CELEX~POPIS[~TOOLTIP]  alebo  URL~POPIS[~TOOLTIP]   (môže sa OPAKOVAŤ)
               -> tlačidlo s odkazom na právny predpis vedľa "✍ QES".
               Pri CELEX~ sa EUR-Lex otvorí v jazyku AKTÍVNEJ vlajky.
               napr. law=CELEX:32001R1049~1049/2001
       orig  = URL podpísaného originálu (QES) — tlačidlo download + cieľ vlajok s tokenom ":o"; ak chýba, sťahuje sa doc
     Bez parametrov beží DEMO konfigurácia case-telekom (9 jazykov).
     ============================================================ */
  var qs = new URLSearchParams(location.search);
  var DOC1 = qs.get("doc") || "";
  var DOC2 = qs.get("doc2") || "";
  var ORIG = qs.get("orig") || "";   // voliteľné: URL podpísaného originálu (QES) pre tlačidlo download
  var LANGS = qs.get("langs") || "";
  var TARGET = Math.max(1, parseInt(qs.get("page") || "1", 10) || 1);
  var QJUMP  = qs.get("qj") || 0;      // prišli sme cez tlačidlo ✍ QES -> zarovnanie na podpis
  var ACTIVE_DOC = qs.get("d") === "2" ? 2 : 1;                  // ktorý doc je otvorený
  var DOC = ACTIVE_DOC === 2 ? DOC2 : DOC1;
  var scale = window.innerWidth < 600 ? 1.1 : 1.5;

  // ---- jazyková lišta ----
  var langs = LANGS ? LANGS.split(",").map(function(s){
    var p = s.split(":");
    return { code: p[0].toUpperCase(), page: parseInt(p[1], 10) || 1, doc: p[2] === "2" ? 2 : 1, ext: p[2] === "o" };
  }) : [];
  var bar = document.getElementById("langbar");
  langs.forEach(function(L){
    var a = document.createElement("a");
    a.textContent = L.code;
    a.className = "f-" + L.code;
    a.dataset.code = L.code;
    if (L.ext) {
      // jazyk existuje ako reálne odoslaný podpísaný originál -> externý odkaz na OneDrive (orig)
      a.href = ORIG || "#";
      a.target = "_blank";
      a.rel = "noopener";
    } else if (L.doc === ACTIVE_DOC) {
      a.href = "#";
      a.onclick = function(ev){ ev.preventDefault(); jumpTo(L.page); setActive(L.code); };
    } else {
      // jazyk žije v druhom súbore -> reload viewera s prepnutým doc
      var u = new URL(location.href);
      u.searchParams.set("d", String(L.doc === 2 ? 2 : 1));
      u.searchParams.set("page", String(L.page));
      a.href = u.toString();
    }
    bar.appendChild(a);
  });
  // ---- lokalizované popisy tlačidiel podľa jazyka konania ----
  var QES_LABELS={DE:"Signiertes Original (QES)",EN:"Signed original (QES)",SK:"Podpísaný originál (QES)",HR:"Potpisani izvornik (QES)",PL:"Podpisany oryginał (QES)",ES:"Original firmado (QES)",IT:"Originale firmato (QES)",FR:"Original signé (QES)",SV:"Signerat original (QES)"};
  var REL_LABELS_EINW={DE:"Einwendung gegen die Vollstreckung (ZOLL/DAK)",EN:"Objection to enforcement (Einwendung ZOLL/DAK)",SK:"Námietka proti exekúcii (Einwendung ZOLL/DAK)",HR:"Prigovor protiv ovrhe (Einwendung ZOLL/DAK)",PL:"Sprzeciw wobec egzekucji (Einwendung ZOLL/DAK)",ES:"Oposición a la ejecución (Einwendung ZOLL/DAK)",IT:"Opposizione all'esecuzione (Einwendung ZOLL/DAK)",FR:"Opposition à l'exécution (Einwendung ZOLL/DAK)",SV:"Bestridande av verkställighet (Einwendung ZOLL/DAK)"};
  var relButtonEl=null;

  // ---- tlačidlo "Súhrn" — odkaz na súhrn položky v registri ----
  var SUM_LABELS={DE:"Zusammenfassung",EN:"Summary",SK:"Súhrn",HR:"Sažetak",PL:"Streszczenie",
                  ES:"Resumen",IT:"Riepilogo",FR:"Résumé",SV:"Sammanfattning"};
  var sumBtnEl=null;
  var SUMU=qs.get("sum")||"";
  var SUMDATA=null, SUMBOX=null;
  if(SUMU){
    var sa=document.createElement("a");
    sa.className="sumref";
    sa.textContent="\u{1F4C4} "+SUM_LABELS.SK;
    if(/^https?:/i.test(SUMU)){
      sa.target="_blank"; sa.rel="noopener"; sa.href=SUMU;
    } else {
      sa.href="#";
      sa.onclick=function(ev){ ev.preventDefault(); openSum(); };
    }
    bar.appendChild(sa); sumBtnEl=sa;
  }

  function ensureBox(){
    if(SUMBOX) return SUMBOX;
    SUMBOX=document.createElement("div"); SUMBOX.id="sumbox";
    SUMBOX.innerHTML='<div class="sb"><a class="sbx" href="#">&times;</a><div class="sbc"></div></div>';
    SUMBOX.addEventListener("click",function(ev){
      if(ev.target===SUMBOX||ev.target.className==="sbx"){ ev.preventDefault(); SUMBOX.classList.remove("on"); }
    });
    document.addEventListener("keydown",function(ev){ if(ev.key==="Escape") SUMBOX.classList.remove("on"); });
    document.body.appendChild(SUMBOX);
    return SUMBOX;
  }
  // JEDINÝ ZDROJ textu = súhrnný modál na karte registra (#303).
  // Viewer si ho odtiaľ načíta a len zobrazí; nikde sa nekopíruje.
  var SUMSRC="https://public-api.wordpress.com/wp/v2/sites/foxprof.club/pages/303?_fields=content";
  function paintSum(){
    if(!SUMDATA||!SUMBOX) return;
    var L=(CURLANG||"SK").toLowerCase();
    var d=SUMDATA[L]||SUMDATA.sk||SUMDATA.de;
    if(!d) return;
    SUMBOX.querySelector(".sbc").innerHTML=d;
  }
  function openSum(){
    var b=ensureBox(); b.classList.add("on");
    if(SUMDATA){ paintSum(); return; }
    b.querySelector(".sbc").innerHTML="<p>…</p>";
    fetch(SUMSRC).then(function(r){ return r.json(); }).then(function(j){
      var html=(j&&j.content&&j.content.rendered)||"";
      var doc=new DOMParser().parseFromString(html,"text/html");
      var mod=doc.getElementById(SUMU);
      if(!mod) throw new Error("modal nenajdeny");
      SUMDATA={};
      [].slice.call(mod.querySelectorAll(".gtl-b")).forEach(function(el){
        var code=null;
        [].slice.call(el.classList).forEach(function(c){ if(c!=="gtl-b"&&c.length===2) code=c; });
        if(code) SUMDATA[code]=el.innerHTML;
      });
      paintSum();
    }).catch(function(){
      b.querySelector(".sbc").innerHTML="<p>Súhrn sa nepodarilo načítať. "+
        '<a href="https://foxprof.club/kauzy-koncept/#'+SUMU+'" target="_blank" rel="noopener">Otvoriť v registri</a></p>';
    });
  }

  // ---- tlačidlo skoku na vizuálny QES podpis (za poslednou vlajkou) ----
  var qesBtnEl=null;
  var QESP = qs.get("qes") || "";
  var qPage = 0, qDoc = 0, QALIGN = "b";
  if (QESP) {
    // (a) explicitne zadaná strana — má prednosť
    // qes=PAGE[:DOC[:ALIGN]]   ALIGN: b=spodok strany (default), t=vrch, 0..1=pomer výšky
    var qp = QESP.split(":");
    qPage = Math.max(1, parseInt(qp[0], 10) || 1);
    qDoc  = qp[1] === "1" ? 1 : (qp[1] === "2" ? 2 : (DOC2 ? 2 : 1));
    QALIGN = (qp[2] === undefined || qp[2] === "") ? "b" : qp[2];
  }
  // Auto-odvodenie NEEXISTUJE: poloha podpisu aj podpisový jazyk sa menia
  // dokument od dokumentu -> bez parametra qes= sa tlačidlo NEVYKRESLÍ.
  if (qPage) {
    var qa = document.createElement("a");
    qa.className = "qesjump";
    qa.textContent = "\u270D QES";
    if (qDoc === ACTIVE_DOC) {
      qa.href = "#";
      qa.onclick = function(ev){ ev.preventDefault(); jumpTo(qPage, 0, QALIGN); };
    } else {
      var qu = new URL(location.href);
      qu.searchParams.set("d", String(qDoc));
      qu.searchParams.set("page", String(qPage));
      qu.searchParams.set("qj", String(QALIGN));
      qa.href = qu.toString();
    }
    bar.appendChild(qa);
    qesBtnEl = qa;
  }
  // ---- 9-jazyčné názvy predpisov pre tooltip (kľúč = CELEX) ----
  // Pri novom predpise sem doplň všetkých 9 jazykov; bez záznamu sa použije
  // text z 3. segmentu parametra law= (rovnaký vo všetkých jazykoch).
  var LAW_TITLES = {
    "CELEX:32001R1049": {
      DE:"Verordnung (EG) Nr. 1049/2001 des Europäischen Parlaments und des Rates vom 30. Mai 2001 über den Zugang der Öffentlichkeit zu Dokumenten",
      EN:"Regulation (EC) No 1049/2001 of the European Parliament and of the Council of 30 May 2001 regarding public access to documents",
      SK:"Nariadenie Európskeho parlamentu a Rady (ES) č. 1049/2001 z 30. mája 2001 o prístupe verejnosti k dokumentom",
      HR:"Uredba (EZ) br. 1049/2001 Europskog parlamenta i Vijeća od 30. svibnja 2001. o javnom pristupu dokumentima",
      PL:"Rozporządzenie (WE) nr 1049/2001 Parlamentu Europejskiego i Rady z dnia 30 maja 2001 r. w sprawie publicznego dostępu do dokumentów",
      ES:"Reglamento (CE) n.º 1049/2001 del Parlamento Europeo y del Consejo, de 30 de mayo de 2001, relativo al acceso del público a los documentos",
      IT:"Regolamento (CE) n. 1049/2001 del Parlamento europeo e del Consiglio, del 30 maggio 2001, relativo all\u0027accesso del pubblico ai documenti",
      FR:"Règlement (CE) n° 1049/2001 du Parlement européen et du Conseil du 30 mai 2001 relatif à l\u0027accès du public aux documents",
      SV:"Europaparlamentets och rådets förordning (EG) nr 1049/2001 av den 30 maj 2001 om allmänhetens tillgång till handlingar"
    }
  };

  // ---- tlačidlá odkazov na právne predpisy (za "✍ QES") ----
  var lawBtns = [];
  (qs.getAll ? qs.getAll("law") : []).forEach(function(spec){
    if (!spec) return;
    var parts  = spec.split("~");
    var target = parts[0];
    var label  = parts.length > 1 && parts[1] ? parts[1] : "\u2696";
    var title  = parts.length > 2 ? parts.slice(2).join("~") : "";
    var a = document.createElement("a");
    a.className = "lawref";
    a.target = "_blank";
    a.rel = "noopener";
    a.textContent = "\u2696 " + label;
    if (title) { a.title = title; a.dataset.fallbackTitle = title; }
    if (/^CELEX:/i.test(target)) {
      a.dataset.celex = target;                 // jazyk sa doplní v updateLabels
      a.href = celexUrl(target, "SK");
    } else {
      a.href = target;
    }
    bar.appendChild(a);
    lawBtns.push(a);
  });
  function celexUrl(celex, lang){
    // priame HTML znenie predpisu v jazyku aktívnej vlajky.
    // dvojbodku v CELEX NEencodovať (EUR-Lex ju očakáva doslovne),
    // locale= drží jazyk aj keď EUR-Lex presmeruje.
    return "https://eur-lex.europa.eu/legal-content/" + lang.toUpperCase() +
           "/TXT/HTML/?uri=" + celex + "&locale=" + lang.toLowerCase();
  }

  var CURLANG="SK";
  function updateLabels(code){
    CURLANG=(code||"SK").toUpperCase();
    code=(code||"").toUpperCase();
    var dl=document.getElementById("dl");
    if(dl) dl.textContent="⬇ "+(QES_LABELS[code]||QES_LABELS.SK);
    if(qesBtnEl) qesBtnEl.title=(QES_LABELS[code]||QES_LABELS.SK);
    if(sumBtnEl){
      var SL=(code||"SK").toUpperCase();
      sumBtnEl.textContent="\u{1F4C4} "+(SUM_LABELS[SL]||SUM_LABELS.SK);
      sumBtnEl.title=(SUM_LABELS[SL]||SUM_LABELS.SK);
    }
    paintSum();
    lawBtns.forEach(function(a){
      var L = (code||"SK").toUpperCase();
      if(a.dataset.celex){
        a.href = celexUrl(a.dataset.celex, L);
        var t = LAW_TITLES[a.dataset.celex];
        if (t && t[L]) a.title = t[L];
        else if (a.dataset.fallbackTitle) a.title = a.dataset.fallbackTitle;
      }
    });
    if(relButtonEl){
      var isEinw=/ZOLL\/DAK/i.test(RELLABEL);
      relButtonEl.textContent=isEinw?("⚖ "+(REL_LABELS_EINW[code]||REL_LABELS_EINW.EN)):RELLABEL;
    }
  }

  // ---- súvisiaci dokument (rel) — vlajky jazykov + tlačidlo v páse ----
  var REL = qs.get("rel") || "";
  var RELLANGS = qs.get("rellangs") || "";
  var RELLABEL = qs.get("rellabel") || "Súvisiaci dokument";
  var RELORIG = qs.get("relorig") || "";
  if (REL) {
    var relbarEl = document.getElementById("relbar");
    var relURL = function(pg){
      var u = "viewer.html?doc=" + REL + "&langs=" + RELLANGS + "&page=" + pg;
      if (RELORIG) u += "&orig=" + RELORIG;
      return u;
    };
    var rlangs = RELLANGS ? RELLANGS.split(",").map(function(s){
      var p = s.split(":"); return { code: p[0].toUpperCase(), page: parseInt(p[1],10) || 1 };
    }) : [];
    rlangs.forEach(function(L){
      var fa = document.createElement("a");
      fa.className = "relflag f-" + L.code;
      fa.textContent = L.code;
      fa.href = relURL(L.page);
      fa.title = RELLABEL + " — " + L.code;
      relbarEl.appendChild(fa);
    });
    var rb = document.createElement("a");
    rb.className = "btn rel";
    rb.href = relURL(rlangs.length ? rlangs[0].page : 1);
    relbarEl.appendChild(rb);
    relButtonEl = rb;
    relbarEl.style.display = "";
  }
  (function(){ var best=null; langs.forEach(function(L){ if(L.doc===ACTIVE_DOC && L.page<=TARGET){ if(!best||L.page>=best.page) best=L; } }); updateLabels(best?best.code:"SK"); })();

  function setActive(code){
    bar.querySelectorAll("a").forEach(function(a){
      a.classList.toggle("active", a.dataset.code === code);
    });
    updateLabels(code);
  }
  function activeByPage(p){
    var best = null;
    langs.forEach(function(L){ if (L.doc === ACTIVE_DOC && L.page <= p) {
      if (!best || L.page >= best.page) best = L; } });
    if (best) setActive(best.code);
  }

  // ---- PDF render (lazy, IntersectionObserver) ----
  if (!DOC) {
    document.getElementById("err").style.display = "block";
    document.getElementById("err").textContent = "Chýba parameter ?doc= (URL PDF dokumentu).";
    document.getElementById("status").textContent = "";
    return;
  }
  var elPages=document.getElementById("pages"), elCur=document.getElementById("cur"),
      elTotal=document.getElementById("total"), elStatus=document.getElementById("status"),
      elErr=document.getElementById("err");
  document.getElementById("dl").href = ORIG || DOC;
  if (!window.pdfjsLib){ fail("PDF.js sa nenačítal."); return; }
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";

  var pdfDoc=null, wraps=[], rendered={};
  function fail(m){ elErr.style.display="block"; elErr.textContent="Chyba: "+m; elStatus.textContent=""; }

  pdfjsLib.getDocument({url: DOC}).promise.then(function(pdf){
    pdfDoc = pdf; elTotal.textContent = pdf.numPages;
    if (TARGET > pdf.numPages) TARGET = 1;
    return pdf.getPage(1);
  }).then(function(p1){
    var vp = p1.getViewport({scale: scale}), ratio = vp.height / vp.width;
    for (var i=1; i<=pdfDoc.numPages; i++){
      var w=document.createElement("div");
      w.className="pagewrap"; w.dataset.page=i;
      w.style.paddingBottom=(ratio*100)+"%";
      w.innerHTML='<span class="pnum">'+i+'</span>';
      elPages.appendChild(w); wraps.push(w);
    }
    var io=new IntersectionObserver(function(es){
      es.forEach(function(e){ if(e.isIntersecting) renderPage(+e.target.dataset.page); });
      updateCurrent();
    },{rootMargin:"600px 0px"});
    wraps.forEach(function(w){ io.observe(w); });
    window.addEventListener("scroll", throttle(updateCurrent,200));
    elStatus.textContent="";
    jumpTo(TARGET, 0, QJUMP);
  }).catch(function(e){ fail(e && e.message ? e.message : String(e)); });

  function jumpTo(n, tries, align){
    if (!wraps.length) return;
    n = Math.min(Math.max(1,n), wraps.length);
    tries = tries || 0;
    renderPage(n);
    if (n > 1) renderPage(n-1);
    if (n < wraps.length) renderPage(n+1);
    var doScroll = function(){
      var hdr = document.querySelector("header");
      var off = (hdr ? hdr.offsetHeight : 0) + 4;
      var r = wraps[n-1].getBoundingClientRect();
      var top = r.top + window.pageYOffset;
      var y;
      if (align){
        var frac = parseFloat(align);
        if (align === "b" || align === true){
          // podpis v dolnej časti strany -> spodok strany na spodok okna
          y = top + r.height - window.innerHeight + 10;
        } else if (frac > 0 && frac < 1){
          // podpis v danom pomere výšky strany -> vycentruj ho
          y = top + r.height * frac - window.innerHeight / 2;
        } else {
          y = top - off;
        }
        if (y < top - off) y = top - off;
      } else {
        y = top - off;
      }
      window.scrollTo(0, y < 0 ? 0 : y);
      updateCurrent();
      if (align){
        // strana sa dorenderováva -> zopakuj, kým sa jej výška ustáli
        if (tries < 6 && Math.abs(wraps[n-1].getBoundingClientRect().height - r.height) > 2)
          setTimeout(function(){ jumpTo(n, tries+1, align); }, 200);
        else if (tries < 3)
          setTimeout(function(){ jumpTo(n, tries+1, align); }, 250);
      } else if (tries < 10){
        var cur = parseInt(elCur.textContent, 10) || 1;
        if (cur !== n) setTimeout(function(){ jumpTo(n, tries+1); }, 130);
      }
    };
    requestAnimationFrame(function(){ requestAnimationFrame(doScroll); });
  }
  function renderPage(n){
    if (rendered[n] || !pdfDoc) return;
    rendered[n]=true;
    pdfDoc.getPage(n).then(function(page){
      var vp=page.getViewport({scale:scale}),
          c=document.createElement("canvas"),
          dpr=Math.min(window.devicePixelRatio||1,2);
      c.width=vp.width*dpr; c.height=vp.height*dpr;
      var w=wraps[n-1]; w.style.paddingBottom=""; w.appendChild(c);
      page.render({canvasContext:c.getContext("2d"),
        viewport:page.getViewport({scale:scale*dpr})});
      addLinks(page, w);
    });
  }
  function addLinks(page, wrap){
    if (wrap.querySelector(".linklayer")) return;
    page.getAnnotations().then(function(anns){
      if (wrap.querySelector(".linklayer")) return;
      var vp1=page.getViewport({scale:1});
      var layer=document.createElement("div"); layer.className="linklayer";
      anns.forEach(function(a){
        if (a.subtype!=="Link" || !a.rect || (!a.url && !a.dest)) return;
        var vr=vp1.convertToViewportRectangle(a.rect);
        var x1=Math.min(vr[0],vr[2]), x2=Math.max(vr[0],vr[2]),
            y1=Math.min(vr[1],vr[3]), y2=Math.max(vr[1],vr[3]);
        var el=document.createElement("a");
        el.style.left=(x1/vp1.width*100)+"%"; el.style.top=(y1/vp1.height*100)+"%";
        el.style.width=((x2-x1)/vp1.width*100)+"%"; el.style.height=((y2-y1)/vp1.height*100)+"%";
        if (a.url){ el.href=a.url; el.target="_blank"; el.rel="noopener noreferrer"; }
        else { el.href="#"; el.addEventListener("click", function(ev){ ev.preventDefault(); goToDest(a.dest); }); }
        layer.appendChild(el);
      });
      wrap.appendChild(layer);
    }).catch(function(){});
  }
  function goToDest(dest){
    if (!dest || !pdfDoc) return;
    (typeof dest==="string" ? pdfDoc.getDestination(dest) : Promise.resolve(dest)).then(function(d){
      if (!d || !d[0]) return;
      pdfDoc.getPageIndex(d[0]).then(function(idx){ jumpTo(idx+1); }).catch(function(){});
    }).catch(function(){});
  }
  function updateCurrent(){
    var mid=window.scrollY+window.innerHeight/3, best=1;
    for (var i=0;i<wraps.length;i++){
      if (wraps[i].offsetTop<=mid) best=i+1; else break;
    }
    elCur.textContent=best;
    activeByPage(best);
  }
  function throttle(fn,ms){var t=0;return function(){var n=Date.now();if(n-t>ms){t=n;fn();}};}

  document.getElementById("zoomIn").onclick=function(){rezoom(scale*1.25);};
  document.getElementById("zoomOut").onclick=function(){rezoom(scale/1.25);};
  function rezoom(s){
    scale=Math.min(3,Math.max(0.6,s));
    var cur=parseInt(elCur.textContent,10)||1;
    rendered={};
    wraps.forEach(function(w){w.querySelectorAll("canvas").forEach(function(c){c.remove();});});
    renderPage(cur);
    wraps.forEach(function(w){
      var r=w.getBoundingClientRect();
      if (r.top<window.innerHeight+600 && r.bottom>-600) renderPage(+w.dataset.page);
    });
  }
})();
</script>
</body>
