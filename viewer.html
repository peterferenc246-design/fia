<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>FIA FOX — Dokument viewer </title>
<style>
  :root{--navy:#1F3864;--gold:#FFC000;--red:#C00000;--lightblue:#D6E6F2;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Calibri,Segoe UI,Arial,sans-serif;background:#4a5568;min-height:100vh;}
  header{position:sticky;top:0;z-index:10;background:var(--navy);color:#fff;padding:6px 10px;}
  .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .brand{font-weight:bold;font-size:14px;white-space:nowrap;}
  .pageinfo{font-size:13px;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:6px;white-space:nowrap;}
  .row1 button,.row1 a.btn{border:0;border-radius:6px;padding:5px 9px;font-size:13px;cursor:pointer;
    background:var(--lightblue);color:var(--navy);font-weight:bold;text-decoration:none;display:inline-block;}
  .row1 a.btn.dl{background:var(--gold);color:#000;}
  .spacer{flex:1;}
  /* jazyková lišta — FOX0: každý jazyk svoja farba, aktívny zlatý rámček */
  #langbar{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
  #langbar a{padding:4px 0;width:44px;text-align:center;border-radius:5px;color:#fff;
    font-weight:bold;font-size:13px;text-decoration:none;border:2px solid transparent;}
  #langbar a.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);cursor:default;}
  .f-DE{background:#1F3864}.f-HR{background:#C00000}.f-EN{background:#2E75B6}.f-FR{background:#7030A0}
  .f-PL{background:#C55A11}.f-IT{background:#00B050}.f-SK{background:#1F7A7A}.f-ES{background:#A0326E}.f-SV{background:#806000}.f-GA{background:#169B62}
  #status{color:#fff;font-size:13px;padding:6px 12px;}
  #pages{max-width:900px;margin:10px auto;padding:0 6px;}
  .pagewrap{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4);margin:0 auto 12px;position:relative;}
  .pagewrap .pnum{position:absolute;top:4px;right:8px;font-size:11px;color:#999;}
  canvas{display:block;width:100%;height:auto;}
  .linklayer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;}
  .linklayer a{position:absolute;display:block;pointer-events:auto;}
  .linklayer a:hover{background:rgba(255,192,0,.18);outline:1px solid rgba(255,192,0,.6);border-radius:2px;}
  #err{max-width:900px;margin:20px auto;background:#FDE8E8;border:1px solid var(--red);padding:12px;border-radius:8px;display:none;font-size:14px;}
</style>
<!-- build:links-layer -->
</head>
<body>
<header>
  <div class="row1">
    <span class="brand">FIA FOX — Dokument</span>
    <span class="pageinfo">str. <span id="cur">–</span> / <span id="total">–</span></span>
    <button id="zoomOut" title="Zmenšiť">−</button>
    <button id="zoomIn" title="Zväčšiť">+</button>
    <span class="spacer"></span>
    <a id="dl" class="btn dl" href="#" download>⬇ Podpísaný originál (QES)</a>
  </div>
  <nav id="langbar" aria-label="Jazyky dokumentu"></nav>
</header>
<div id="status">Načítavam dokument…</div>
<div id="err"></div>
<div id="pages"></div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
(function(){
  "use strict";
  if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  /* ============================================================
     PARAMETRE (produkčné rozhranie):
       doc   = URL primárneho PDF  (alebo skratka)
       doc2  = URL sekundárneho PDF (voliteľné — jazyky mimo primárneho)
       page  = úvodná strana v primárnom PDF
       langs = CODE:PAGE[:2|:o],...   tretí token "2" = jazyk žije v doc2;
               "o" = vlajka je externý odkaz na orig= (reálne odoslaný podpísaný originál, nový tab)
       orig  = URL podpísaného originálu (QES) — tlačidlo download + cieľ vlajok s tokenom ":o"; ak chýba, sťahuje sa doc
     Bez parametrov beží DEMO konfigurácia case-telekom (9 jazykov).
     ============================================================ */
  var qs = new URLSearchParams(location.search);
  var DOC1 = qs.get("doc") || "";
  var DOC2 = qs.get("doc2") || "";
  var ORIG = qs.get("orig") || "";   // voliteľné: URL podpísaného originálu (QES) pre tlačidlo download
  var LANGS = qs.get("langs") || "";
  var TARGET = Math.max(1, parseInt(qs.get("page") || "1", 10) || 1);
  var ACTIVE_DOC = qs.get("d") === "2" ? 2 : 1;                  // ktorý doc je otvorený
  var DOC = ACTIVE_DOC === 2 ? DOC2 : DOC1;
  var scale = window.innerWidth < 600 ? 1.1 : 1.5;

  // ---- jazyková lišta ----
  var langs = LANGS ? LANGS.split(",").map(function(s){
    var p = s.split(":");
    return { code: p[0].toUpperCase(), page: parseInt(p[1], 10) || 1, doc: p[2] === "2" ? 2 : 1, ext: p[2] === "o" };
  }) : [];
  var bar = document.getElementById("langbar");
  langs.forEach(function(L){
    var a = document.createElement("a");
    a.textContent = L.code;
    a.className = "f-" + L.code;
    a.dataset.code = L.code;
    if (L.ext) {
      // jazyk existuje ako reálne odoslaný podpísaný originál -> externý odkaz na OneDrive (orig)
      a.href = ORIG || "#";
      a.target = "_blank";
      a.rel = "noopener";
    } else if (L.doc === ACTIVE_DOC) {
      a.href = "#";
      a.onclick = function(ev){ ev.preventDefault(); jumpTo(L.page); setActive(L.code); };
    } else {
      // jazyk žije v druhom súbore -> reload viewera s prepnutým doc
      var u = new URL(location.href);
      u.searchParams.set("d", String(L.doc === 2 ? 2 : 1));
      u.searchParams.set("page", String(L.page));
      a.href = u.toString();
    }
    bar.appendChild(a);
  });
  function setActive(code){
    bar.querySelectorAll("a").forEach(function(a){
      a.classList.toggle("active", a.dataset.code === code);
    });
  }
  function activeByPage(p){
    var best = null;
    langs.forEach(function(L){ if (L.doc === ACTIVE_DOC && L.page <= p) {
      if (!best || L.page >= best.page) best = L; } });
    if (best) setActive(best.code);
  }

  // ---- PDF render (lazy, IntersectionObserver) ----
  if (!DOC) {
    document.getElementById("err").style.display = "block";
    document.getElementById("err").textContent = "Chýba parameter ?doc= (URL PDF dokumentu).";
    document.getElementById("status").textContent = "";
    return;
  }
  var elPages=document.getElementById("pages"), elCur=document.getElementById("cur"),
      elTotal=document.getElementById("total"), elStatus=document.getElementById("status"),
      elErr=document.getElementById("err");
  document.getElementById("dl").href = ORIG || DOC;
  if (!window.pdfjsLib){ fail("PDF.js sa nenačítal."); return; }
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";

  var pdfDoc=null, wraps=[], rendered={};
  function fail(m){ elErr.style.display="block"; elErr.textContent="Chyba: "+m; elStatus.textContent=""; }

  pdfjsLib.getDocument({url: DOC}).promise.then(function(pdf){
    pdfDoc = pdf; elTotal.textContent = pdf.numPages;
    if (TARGET > pdf.numPages) TARGET = 1;
    return pdf.getPage(1);
  }).then(function(p1){
    var vp = p1.getViewport({scale: scale}), ratio = vp.height / vp.width;
    for (var i=1; i<=pdfDoc.numPages; i++){
      var w=document.createElement("div");
      w.className="pagewrap"; w.dataset.page=i;
      w.style.paddingBottom=(ratio*100)+"%";
      w.innerHTML='<span class="pnum">'+i+'</span>';
      elPages.appendChild(w); wraps.push(w);
    }
    var io=new IntersectionObserver(function(es){
      es.forEach(function(e){ if(e.isIntersecting) renderPage(+e.target.dataset.page); });
      updateCurrent();
    },{rootMargin:"600px 0px"});
    wraps.forEach(function(w){ io.observe(w); });
    window.addEventListener("scroll", throttle(updateCurrent,200));
    elStatus.textContent="";
    jumpTo(TARGET);
  }).catch(function(e){ fail(e && e.message ? e.message : String(e)); });

  function jumpTo(n, tries){
    if (!wraps.length) return;
    n = Math.min(Math.max(1,n), wraps.length);
    tries = tries || 0;
    renderPage(n);
    if (n > 1) renderPage(n-1);
    if (n < wraps.length) renderPage(n+1);
    var doScroll = function(){
      var hdr = document.querySelector("header");
      var off = (hdr ? hdr.offsetHeight : 0) + 4;
      var y = wraps[n-1].getBoundingClientRect().top + window.pageYOffset - off;
      window.scrollTo(0, y < 0 ? 0 : y);
      updateCurrent();
      if (tries < 10){
        var cur = parseInt(elCur.textContent, 10) || 1;
        if (cur !== n) setTimeout(function(){ jumpTo(n, tries+1); }, 130);
      }
    };
    requestAnimationFrame(function(){ requestAnimationFrame(doScroll); });
  }
  function renderPage(n){
    if (rendered[n] || !pdfDoc) return;
    rendered[n]=true;
    pdfDoc.getPage(n).then(function(page){
      var vp=page.getViewport({scale:scale}),
          c=document.createElement("canvas"),
          dpr=Math.min(window.devicePixelRatio||1,2);
      c.width=vp.width*dpr; c.height=vp.height*dpr;
      var w=wraps[n-1]; w.style.paddingBottom=""; w.appendChild(c);
      page.render({canvasContext:c.getContext("2d"),
        viewport:page.getViewport({scale:scale*dpr})});
      addLinks(page, w);
    });
  }
  function addLinks(page, wrap){
    if (wrap.querySelector(".linklayer")) return;
    page.getAnnotations().then(function(anns){
      if (wrap.querySelector(".linklayer")) return;
      var vp1=page.getViewport({scale:1});
      var layer=document.createElement("div"); layer.className="linklayer";
      anns.forEach(function(a){
        if (a.subtype!=="Link" || !a.rect || (!a.url && !a.dest)) return;
        var vr=vp1.convertToViewportRectangle(a.rect);
        var x1=Math.min(vr[0],vr[2]), x2=Math.max(vr[0],vr[2]),
            y1=Math.min(vr[1],vr[3]), y2=Math.max(vr[1],vr[3]);
        var el=document.createElement("a");
        el.style.left=(x1/vp1.width*100)+"%"; el.style.top=(y1/vp1.height*100)+"%";
        el.style.width=((x2-x1)/vp1.width*100)+"%"; el.style.height=((y2-y1)/vp1.height*100)+"%";
        if (a.url){ el.href=a.url; el.target="_blank"; el.rel="noopener noreferrer"; }
        else { el.href="#"; el.addEventListener("click", function(ev){ ev.preventDefault(); goToDest(a.dest); }); }
        layer.appendChild(el);
      });
      wrap.appendChild(layer);
    }).catch(function(){});
  }
  function goToDest(dest){
    if (!dest || !pdfDoc) return;
    (typeof dest==="string" ? pdfDoc.getDestination(dest) : Promise.resolve(dest)).then(function(d){
      if (!d || !d[0]) return;
      pdfDoc.getPageIndex(d[0]).then(function(idx){ jumpTo(idx+1); }).catch(function(){});
    }).catch(function(){});
  }
  function updateCurrent(){
    var mid=window.scrollY+window.innerHeight/3, best=1;
    for (var i=0;i<wraps.length;i++){
      if (wraps[i].offsetTop<=mid) best=i+1; else break;
    }
    elCur.textContent=best;
    activeByPage(best);
  }
  function throttle(fn,ms){var t=0;return function(){var n=Date.now();if(n-t>ms){t=n;fn();}};}

  document.getElementById("zoomIn").onclick=function(){rezoom(scale*1.25);};
  document.getElementById("zoomOut").onclick=function(){rezoom(scale/1.25);};
  function rezoom(s){
    scale=Math.min(3,Math.max(0.6,s));
    var cur=parseInt(elCur.textContent,10)||1;
    rendered={};
    wraps.forEach(function(w){w.querySelectorAll("canvas").forEach(function(c){c.remove();});});
    renderPage(cur);
    wraps.forEach(function(w){
      var r=w.getBoundingClientRect();
      if (r.top<window.innerHeight+600 && r.bottom>-600) renderPage(+w.dataset.page);
    });
  }
})();
</script>
</body>
</html>
